<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
        integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="container">
        <form id="loginForm">
            <label>
                Email:
                <input name="email" type="email" required placeholder="Type your email..." autofocus></label>
            <label>
                Phone:
                <input name="phone" type="tel" required placeholder="Enter your phone..." autofocus
                    maxlength="15"></label>
            <label>
                Password:
                <input name="password" type="password" required minlength="6" placeholder="Type your password..."
                    autofocus></label>
            <button type="submit">Login</button>
        </form>
    </div>
    <script src="./script.js"></script>
</body>

</html>
