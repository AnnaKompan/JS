    <div class="container">
        <form id="loginForm">
            <label for="email">
                Email:
                <input id="email" name="email" type="email" required placeholder="Type your email..." autofocus></label>
            <label for="phone">
                Phone:
                <input id="phone" name="phone" type="tel" required placeholder="Enter your phone..."
                    maxlength="15"></label>
            <label for="password">
                Password:
                <input id="password" name="password" type="password" required minlength="6"
                    placeholder="Type your password..."></label>
            <button type="submit">Login</button>
        </form>
